name: Global Partners LP
description: >-
  Global Partners LP is a leading independent owner, supplier, and operator of
  liquid energy terminals, fueling locations, and retail experiences. The
  company distributes gasoline, distillates, residual oil, renewable fuels,
  crude oil, and propane across the Northeast United States through an
  integrated network of terminals, gas stations, and convenience stores.
